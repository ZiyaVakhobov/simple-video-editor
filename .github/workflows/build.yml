name: Build desktop apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            output: windows
            artifact: windows
          - platform: macos-latest # arm64 (Apple Silicon)
            args: "--target aarch64-apple-darwin"
            triple: aarch64-apple-darwin
            output: mac
            artifact: mac-arm64
          - platform: macos-13 # x86_64 (Intel)
            args: "--target x86_64-apple-darwin"
            triple: x86_64-apple-darwin
            output: mac
            artifact: mac-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || contains(matrix.args, 'x86_64-apple') && 'x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Download FFmpeg sidecar binaries
        run: npm run fetch-ffmpeg
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.triple || '' }}

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # On tag push, create a draft GitHub release with all artifacts attached
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Video Editor {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Stage latest builds
        run: node scripts/stage-builds.mjs ${{ matrix.output }}

      - name: Upload latest builds
        uses: actions/upload-artifact@v4
        with:
          name: latest-builds-${{ matrix.artifact }}
          path: latest_builds
          if-no-files-found: error
